<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>System Scan</title>

<style>
body{
background:black;
color:#00ff66;
font-family:monospace;
overflow:hidden;
margin:0;
}

#terminal{
padding:20px;
font-size:18px;
}

#progress{
margin-top:20px;
width:80%;
height:20px;
border:1px solid #00ff66;
}

#bar{
height:100%;
width:0%;
background:#00ff66;
}

#game{
position:absolute;
bottom:40px;
left:0;
width:100%;
height:100px;
border-top:1px solid #00ff66;
}

#dino{
position:absolute;
bottom:0;
left:0;
font-size:40px;
}

#corp{
position:absolute;
top:10px;
right:20px;
font-size:14px;
color:#00ff66;
opacity:0.6;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="corp">AHM CORPORATION</div>

<div id="terminal">
<div id="text">
Initializing scan...
</div>

<div id="progress">
<div id="bar"></div>
</div>
</div>

<div id="game">
<div id="dino">🦖</div>
</div>

<script>

let percent = 0
let bar = document.getElementById("bar")
let text = document.getElementById("text")

let messages = [
"Scanning device...",
"Menganalisa sistem...",
"Mencari file tersembunyi...",
"Ditemukan 1.245 file aneh...",
"Mengirim data ke server...",
"Decrypting storage..."
]

let scan = setInterval(()=>{
percent++

bar.style.width = percent + "%"

if(percent % 15 === 0){
text.innerHTML += "<br>" + messages[Math.floor(Math.random()*messages.length)]
}

if(percent >= 100){
clearInterval(scan)
text.innerHTML += "<br><br>Scan selesai..."
text.innerHTML += "<br>Tenang. Ini cuma prank."
}

},120)


let dino = document.getElementById("dino")
let pos = 0

setInterval(()=>{
pos += 25
if(pos > window.innerWidth){
pos = -50
}
dino.style.left = pos + "px"
},30)

</script>

</body>
  </html>
